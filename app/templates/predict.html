{% extends "base.html" %}

{% block content %}

<section class="container pb-5">
    <div class="section-heading">
        <p class="eyebrow">Single customer scoring</p>
        <h1>Predict Churn Risk</h1>
    </div>

    <form class="form-panel" method="post" action="{{ url_for('main.predict') }}">
        <div class="row g-3">
            {% for field, choices in options.items() %}
                <div class="col-md-4">
                    <label class="form-label" for="{{ field }}">{{ field }}</label>
                    <select class="form-select" id="{{ field }}" name="{{ field }}" required>
                        {% for choice in choices %}
                            <option value="{{ choice }}"
                                {% if values.get(field)|string == choice|string %}selected{% endif %}>
                                {{ choice }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
            {% endfor %}

            <div class="col-md-4">
                <label class="form-label" for="tenure">tenure</label>
                <input class="form-control" id="tenure" name="tenure" type="number"
                       min="0" max="100" step="1" value="{{ values.get('tenure') }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label" for="MonthlyCharges">MonthlyCharges</label>
                <input class="form-control" id="MonthlyCharges" name="MonthlyCharges" type="number"
                       min="0" step="0.01" value="{{ values.get('MonthlyCharges') }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label" for="TotalCharges">TotalCharges</label>
                <input class="form-control" id="TotalCharges" name="TotalCharges" type="number"
                       min="0" step="0.01" value="{{ values.get('TotalCharges') }}" required>
            </div>
        </div>

        <div class="d-flex justify-content-end mt-4">
            <button class="btn btn-primary" type="submit">Predict Churn</button>
        </div>
    </form>
</section>

{% endblock %}
